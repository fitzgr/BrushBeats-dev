name: Build Frontend (Development)

on:
  push:
    branches: ["develop"]
  workflow_dispatch:

concurrency:
  group: build-development
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (development env)
        env:
          VITE_API_BASE: http://localhost:4000
          VITE_GIT_SHA: ${{ github.sha }}
        run: npm run build

      - name: Upload development build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-develop
          path: frontend/dist